{% extends "base.html" %}
{% block title %}Redefinir Senha{% endblock %}
{% block page_title %}Redefinir Senha{% endblock %}

{% block content_full %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 420px; border-radius: 16px;">
        <div class="card-body p-4 text-center">
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center" style="width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px;">
                    <i class="bi bi-headset text-white fs-2"></i>
                </div>
                <h4 class="mt-3 mb-1">Redefinir Senha</h4>
                <p class="text-muted small">Digite sua nova senha</p>
            </div>

            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label">Nova senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="Mínimo 4 caracteres" required minlength="4">
                    </div>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">Confirmar nova senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" name="confirm_password" placeholder="Repita a senha" required minlength="4">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Redefinir Senha</button>
            </form>

            <div class="mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i> Voltar ao login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
